  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3
  get_it: ^8.0.3
  device_info_plus: ^12.1.0
  drift: ^2.28.1
  file_picker: ^10.3.3
  toastification: ^3.0.3
  url_launcher: ^6.3.1
  jiffy: ^6.4.3
  package_info_plus: ^9.0.0
  lucide_icons_flutter: ^3.1.9
